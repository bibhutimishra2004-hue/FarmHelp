<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgriTech - Weather</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="js/lang.js"></script>
</head>
<body>

<div class="top-bar">
  <div class="brand-title" data-i18n="app_title">🌱 AgriTech</div>
  <div class="nav-links">
    <select onchange="setLanguage(this.value)" class="form-input" style="padding: 5px 10px; width: auto; background-color: var(--bg-main);">
      <option value="en">English</option>
      <option value="hi">हिंदी</option>
    </select>
    <button class="btn btn-primary" onclick="goToDashboard()" data-i18n="back_btn">[←] Dashboard</button>
  </div>
</div>

<div class="container">
  <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
    <h2 data-i18n="weather_forecast">🌤 Weather Forecast</h2>
    <p style="margin-bottom: 2rem;" data-i18n="weather_sub_msg">Fetch meteorological data for your region.</p>

    <div class="form-group">
      <label class="form-label" data-i18n="city_label">City Name</label>
      <input id="city" class="form-input" placeholder="Enter City (e.g., Delhi, Pune)" />
    </div>

    <button class="btn btn-primary" onclick="getWeather()" data-i18n="fetch_data">
      Fetch Data
    </button>

    <div id="weather" class="result-box" data-i18n="waiting">
      > Expected meteorological data...
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/weather.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const saved = localStorage.getItem('agritech_lang');
    if (saved) document.querySelector('select').value = saved;
  });
</script>
</body>
</html>
