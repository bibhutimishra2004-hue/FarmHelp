<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AgriTech - Crop Recommendation</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="js/lang.js"></script>
</head>
<body>

<div class="top-bar">
  <div class="brand-title" data-i18n="app_title">🌱 AgriTech</div>
  <div class="nav-links">
    <select onchange="setLanguage(this.value)" class="form-input" style="padding: 5px 10px; width: auto; background-color: var(--bg-main);">
      <option value="en">English</option>
      <option value="hi">हिंदी</option>
    </select>
    <button class="btn btn-primary" onclick="window.location.href='dashboard.html'" data-i18n="back_btn">[←] Dashboard</button>
  </div>
</div>

<div class="container">
  <div class="glass-card" style="max-width: 700px; margin: 0 auto;">
    <h2 data-i18n="rec_model">🌾 Run Recommendation Model</h2>
    <p style="margin-bottom: 2rem;" data-i18n="rec_sub">Input environmental parameters to infer best crop.</p>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
      <div class="form-group">
        <label class="form-label" data-i18n="region_label">Region</label>
        <input class="form-input" id="region" placeholder="Enter Region" />
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="soil_label">Soil Type</label>
        <select class="form-input" id="soil">
          <option value="">Select Soil Type</option>
          <option value="loamy">Loamy</option>
          <option value="clayey">Clayey</option>
          <option value="sandy">Sandy</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="weather_cond">Weather Conditions</label>
        <input class="form-input" id="weather" placeholder="hot, humid, etc" />
      </div>

      <div class="form-group">
        <label class="form-label" data-i18n="season_label">Season</label>
        <select class="form-input" id="season">
          <option value="">Select Season</option>
          <option value="kharif">Kharif</option>
          <option value="rabi">Rabi</option>
          <option value="zaid">Zaid</option>
        </select>
      </div>
    </div>

    <button class="btn btn-primary" onclick="getRecommendation()" style="margin-top: 1rem;" data-i18n="query_model">
      model.predict()
    </button>

    <div id="result" class="result-box" data-i18n="waiting">
      > Awaiting execution...
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/recommend.js"></script>
<script>
  document.addEventListener("DOMContentLoaded", () => {
    const saved = localStorage.getItem('agritech_lang');
    if (saved) document.querySelector('select').value = saved;
  });
</script>
</body>
</html>
