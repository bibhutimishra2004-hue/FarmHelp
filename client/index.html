<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriTech - Login</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="js/lang.js"></script>
</head>
<body>

<div style="position: absolute; top: 20px; right: 20px;">
  <select onchange="setLanguage(this.value)" class="form-input" style="padding: 5px 10px; width: auto;">
    <option value="en">English (EN)</option>
    <option value="hi">हिंदी (HI)</option>
  </select>
</div>

<div class="auth-wrapper">
  <div class="glass-card auth-card">
    <div class="auth-header">
      <div class="brand-title" style="justify-content: center; margin-bottom: 1rem;" data-i18n="app_title">
        🌱 AgriTech
      </div>
      <h2 data-i18n="welcome_back">Welcome Back</h2>
      <p data-i18n="login_sub">Log in to access your farmer dashboard</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="username" data-i18n="username">Username</label>
      <input class="form-input" id="username" type="text" placeholder="Enter your username">
    </div>

    <div class="form-group">
      <label class="form-label" for="password" data-i18n="password">Password</label>
      <input class="form-input" id="password" type="password" placeholder="Enter your password">
    </div>

    <button class="btn btn-primary" onclick="login()" style="width: 100%; margin-top: 1rem;" data-i18n="sign_in">
      Sign In
    </button>

    <div class="auth-footer">
      <p><span data-i18n="new_user">New user?</span> <a href="register.html" data-i18n="create_account">Create an account</a></p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
